// ── SCORING ───────────────────────────────────────────────────────────────────
var SECTOR_MOM = {ai:0.92,tech:0.78,defense:0.65,mining:0.71};

function calcScore(ticker) {
  var s = STOCKS[ticker];
  if (!s) return 50;
  var chg = Math.min(100, Math.max(0, 50 + s.change * 8));
  var sec = (SECTOR_MOM[s.sector] || 0.5) * 100;
  var pe  = s.pe < 20 ? 85 : s.pe < 35 ? 70 : s.pe < 60 ? 55 : 40;
  var raw = chg*0.30 + s.score*0.20 + s.sentiment*0.15 + sec*0.20 + pe*0.15;
  var bonus = s.sentiment > 80 ? 3 : s.sentiment < 40 ? -3 : 0;
  return Math.round(Math.min(99, Math.max(22, raw + bonus)));
}

function calcPortQuality(port) {
  if (!port.length) return 0;
  var total=0, wt=0;
  port.forEach(function(p) {
    var s = STOCKS[p.ticker];
    if (s) { var v = s.price*p.shares; total += calcScore(p.ticker)*v; wt += v; }
  });
  var base = wt ? total/wt : 50;
  var sectors = {};
  port.forEach(function(p){ var s=STOCKS[p.ticker]; if(s) sectors[s.sector]=1; });
  var divBonus = Object.keys(sectors).length >= 3 ? 4 : Object.keys(sectors).length === 2 ? 2 : 0;
  var topW = 0;
  port.forEach(function(p){ var s=STOCKS[p.ticker]; if(s && wt) topW = Math.max(topW, s.price*p.shares/wt); });
  var concPen = topW > 0.5 ? 5 : topW > 0.35 ? 2 : 0;
  return Math.round(Math.min(99, Math.max(10, base + divBonus - concPen)));
}

function calcPortMomentum(port) {
  if (!port.length) return 0;
  var total=0, wt=0;
  port.forEach(function(p) {
    var s = STOCKS[p.ticker];
    if (s) {
      var v = s.price*p.shares;
      var sc = (50+s.change*8)*0.40 + s.sentiment*0.35 + (SECTOR_MOM[s.sector]||0.5)*100*0.25;
      total += sc*v; wt += v;
    }
  });
  return Math.round(Math.min(99, Math.max(10, wt ? total/wt : 50)));
}

function calcPortRisk(port) {
  if (!port.length) return 0;
  var total=0, wt=0;
  port.forEach(function(p) {
    var s = STOCKS[p.ticker];
    if (s) {
      var v = s.price*p.shares;
      var peR = s.pe<20?20:s.pe<35?35:s.pe<60?55:75;
      var sc = 100 - (peR*0.40 + (100-s.sentiment)*0.35);
      total += sc*v; wt += v;
    }
  });
  var base = wt ? total/wt : 50;
  var sectors = {};
  port.forEach(function(p){ var s=STOCKS[p.ticker]; if(s) sectors[s.sector]=1; });
  var divCredit = Object.keys(sectors).length >= 3 ? 5 : 0;
  return Math.round(Math.min(99, Math.max(10, base + divCredit)));
}

function scoreLabel(score, type) {
  if (type === 'risk') {
    if (score >= 80) return {label:'Low Risk',color:'#00e088'};
    if (score >= 60) return {label:'Moderate',color:'#f0c040'};
    if (score >= 40) return {label:'Elevated',color:'#ffb020'};
    return {label:'High Risk',color:'#ff4d4d'};
  }
  if (score >= 85) return {label:'Excellent',color:'#00e088'};
  if (score >= 70) return {label:'Strong',color:'#4f8fff'};
  if (score >= 55) return {label:'Moderate',color:'#f0c040'};
  if (score >= 40) return {label:'Weak',color:'#ffb020'};
  return {label:'Poor',color:'#ff4d4d'};
}

var authMode = 'login';

function switchTab(tab) {
  authMode = tab;
  document.getElementById('tab-login').className = 'auth-tab' + (tab==='login'?' active':'');
  document.getElementById('tab-signup').className = 'auth-tab' + (tab==='signup'?' active':'');
  document.getElementById('auth-name').style.display = tab==='signup' ? 'block' : 'none';
  document.getElementById('auth-submit').textContent = tab==='login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-err').style.display = 'none';
}

function submitAuth() {
  var email = document.getElementById('auth-email').value.trim();
  var password = document.getElementById('auth-password').value;
  var name = document.getElementById('auth-name').value.trim();
  var errEl = document.getElementById('auth-err');
  errEl.style.display = 'none';
  if (!email || !password) { errEl.textContent='Please fill in all fields'; errEl.style.display='block'; return; }
  var btn = document.getElementById('auth-submit');
  btn.textContent = 'Loading...'; btn.disabled = true;
  var body = authMode==='login'
    ? {action:'login',email:email,password:password}
    : {action:'signup',name:name,email:email,password:password};
  fetch('/.netlify/functions/auth', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r){ return r.json(); }).then(function(data) {
    if (data.token) {
      localStorage.setItem('atlas_token', data.token);
      localStorage.setItem('atlas_user', JSON.stringify(data.user || {email:email}));
      document.getElementById('auth-overlay').style.display = 'none';
    } else {
      errEl.textContent = data.error || 'Authentication failed';
      errEl.style.display = 'block';
    }
    btn.textContent = authMode==='login' ? 'Sign In' : 'Create Account';
    btn.disabled = false;
  }).catch(function() {
    errEl.textContent = 'Connection error. Please try again.';
    errEl.style.display = 'block';
    btn.textContent = authMode==='login' ? 'Sign In' : 'Create Account';
    btn.disabled = false;
  });
}

function logout() {
  var token = localStorage.getItem('atlas_token');
  if (token) {
    fetch('/.netlify/functions/auth', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'logout',token:token})
    }).catch(function(){});
  }
  localStorage.removeItem('atlas_token');
  localStorage.removeItem('atlas_user');
  document.getElementById('auth-overlay').style.display = 'flex';
}

function checkAuthAsync() {
  var token = localStorage.getItem('atlas_token');
  if (!token) {
    document.getElementById('auth-overlay').style.display = 'flex';
    return;
  }
  fetch('/.netlify/functions/auth', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'verify',token:token})
  }).then(function(r){ return r.json(); }).then(function(data) {
    if (!data.user) {
      localStorage.removeItem('atlas_token');
      localStorage.removeItem('atlas_user');
      document.getElementById('auth-overlay').style.display = 'flex';
    }
  }).catch(function() {
    // Network error: keep user logged in, don't block dashboard
  });
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('auth-overlay').style.display !== 'none') {
    submitAuth();
  }
});

      '<div class="card"><div class="sec-title">Market Sentiment</div>' + sentHtml + '</div>' +
      '<div class="card"><div class="sec-title">Top ETFs</div>' + etfHtml + '</div>' +
      '</div>';
  }

  else if (page === 'portfolio') {
    var q = calcPortQuality(portfolio);
    var m = calcPortMomentum(portfolio);
    var r = calcPortRisk(portfolio);
    var ql = scoreLabel(q,'quality'), ml = scoreLabel(m,'quality'), rl = scoreLabel(r,'risk');
    var totalVal=0, totalCost=0;
    portfolio.forEach(function(p){ var s=STOCKS[p.ticker]; if(s){totalVal+=s.price*p.shares; totalCost+=p.avgCost*p.shares;} });
    var pnl = totalVal - totalCost;
    var pnlPct = totalCost ? pnl/totalCost*100 : 0;
    var rowsHtml = portfolio.length === 0
      ? '<tr><td colspan="9" style="text-align:center;padding:40px;color:#4a5a7a">No positions yet. Add your first stock above.</td></tr>'
      : portfolio.map(function(p) {
          var s = STOCKS[p.ticker];
          var price = s ? s.price : 0;
          var val = price * p.shares;
          var cost = p.avgCost * p.shares;
          var pl = val - cost;
          var plPct = cost ? pl/cost*100 : 0;
          var sc = s ? calcScore(p.ticker) : 50;
          var sl = scoreLabel(sc,'quality');
          return '<tr>' +
            '<td style="color:#f0c040;font-weight:900;cursor:pointer" onclick="openStock(\'' + p.ticker + '\')">' + p.ticker + '</td>' +
            '<td style="color:#6070a0">' + (s ? s.name : 'Unknown') + '</td>' +
            '<td>' + p.shares + '</td>' +
            '<td>$' + p.avgCost.toFixed(2) + '</td>' +
            '<td class="lp" id="lp-' + p.ticker + '">$' + price.toFixed(2) + '</td>' +
            '<td style="font-weight:700">$' + val.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) + '</td>' +
            '<td class="' + (pl>=0?'pos':'neg') + '">' + (pl>=0?'+':'') + '$' + Math.abs(pl).toFixed(2) + ' (' + (plPct>=0?'+':'') + plPct.toFixed(1) + '%)</td>' +
            '<td><span style="color:' + sl.color + ';font-weight:800">' + sc + '</span></td>' +
            '<td><button class="btn-ghost" onclick="removePosition(\'' + p.ticker + '\')">&#x2715;</button></td>' +
            '</tr>';
        }).join('');
    main.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">' +
      '<div class="page-header" style="margin-bottom:0"><div class="page-title">Portfolio</div><div class="page-sub">Your positions &amp; analytics</div></div>' +
      '<button class="btn" onclick="showAddModal()">+ Add Position</button>' +
      '</div>' +
      '<div class="g2" style="margin-bottom:20px">' +
      '<div class="card">' +
      '<div style="font-size:11px;color:#4a5a7a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Total Value</div>' +
      '<div style="font-size:34px;font-weight:900">$' + totalVal.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) + '</div>' +
      '<div class="' + (pnl>=0?'pos':'neg') + '" style="font-size:14px;margin-top:5px;font-weight:700">' + (pnl>=0?'+':'') + '$' + Math.abs(pnl).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' (' + (pnlPct>=0?'+':'') + pnlPct.toFixed(2) + '%)</div>' +
      '</div>' +
      '<div class="card" style="display:flex;align-items:center">' +
      '<div style="font-size:12px;color:#4a5a7a;line-height:1.7"><b style="color:#6070a0">Quality</b> = Atlas scores weighted by position value<br><b style="color:#6070a0">Momentum</b> = 24h change + sentiment + sector trend<br><b style="color:#6070a0">Risk</b> = P/E + sentiment + concentration penalty</div>' +
      '</div>' +
      '</div>' +
      '<div class="g3" style="margin-bottom:24px">' +
      '<div class="score-box"><div class="score-type">Quality</div><div class="score-num" style="color:' + ql.color + '">' + q + '</div><div class="score-lbl" style="color:' + ql.color + '">' + ql.label + '</div></div>' +
      '<div class="score-box"><div class="score-type">Momentum</div><div class="score-num" style="color:' + ml.color + '">' + m + '</div><div class="score-lbl" style="color:' + ml.color + '">' + ml.label + '</div></div>' +
      '<div class="score-box"><div class="score-type">Risk Score</div><div class="score-num" style="color:' + rl.color + '">' + r + '</div><div class="score-lbl" style="color:' + rl.color + '">' + rl.label + '</div></div>' +
      '</div>' +
      '<div class="card">' +
      '<div class="sec-title">Positions</div>' +
      '<div style="overflow-x:auto"><table class="pos-table"><thead><tr><th>Ticker</th><th>Name</th><th>Shares</th><th>Avg Cost</th><th>Current</th><th>Value</th><th>P&amp;L</th><th>Score</th><th></th></tr></thead><tbody>' + rowsHtml + '</tbody></table></div>' +
      '</div>';
  }

  else if (page === 'etfs') {
    var etfCards = ETFS.map(function(e) {
      var sl = scoreLabel(e.score,'quality');
      var hidden = (activeTag !== 'All' && e.tag !== activeTag) ? 'display:none' : '';
      return '<div class="etf-card" data-tag="' + e.tag + '" onclick="openETF(\'' + e.ticker + '\')" style="' + hidden + '">' +
        '<div class="etf-ticker">' + e.ticker + '</div>' +
        '<div class="etf-name">' + e.name + '</div>' +
        '<div class="etf-ytd ' + (e.ytd>=0?'pos':'neg') + '">' + (e.ytd>=0?'+':'') + e.ytd + '% YTD</div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">' +
        '<span class="tag">' + e.tag + '</span>' +
        '<span style="color:' + sl.color + ';font-weight:800;font-size:13px">&#x2B21; ' + e.score + '</span>' +
        '</div>' +
        '<div class="etf-meta">Expense: ' + e.expense + '% &middot; AUM: ' + e.aum + '</div>' +
        '</div>';
    }).join('');
    var filterBtns = ['All','AI','Tech','Value','Mining'].map(function(t) {
      return '<button class="fbtn' + (t===activeTag?' active':'') + '" onclick="filterETFs(\'' + t + '\',this)">' + t + '</button>';
    }).join('');
    main.innerHTML =
      '<div class="page-header"><div class="page-title">ETF Research</div><div class="page-sub">12 curated funds with Atlas scoring</div></div>' +
      '<div class="filter-bar">' + filterBtns + '</div>' +
      '<div class="g3">' + etfCards + '</div>';
  }

  else if (page === 'sector') {
    var names = {ai:'Artificial Intelligence',tech:'Technology',defense:'Defense',mining:'Mining & Resources'};
    var cards = Object.keys(STOCKS).filter(function(t){ return STOCKS[t].sector===param; }).map(function(t) {
      var s = STOCKS[t]; var sc = calcScore(t); var sl = scoreLabel(sc,'quality');
      return '<div class="stock-card" onclick="openStock(\'' + t + '\')">' +
        '<div class="s-ticker">' + t + '</div>' +
        '<div class="s-name">' + s.name + '</div>' +
        '<div class="s-price lp" id="lp-' + t + '">$' + s.price.toFixed(2) + '</div>' +
        '<div class="s-chg ' + (s.change>=0?'pos':'neg') + '">' + (s.change>=0?'+':'') + s.change + '%</div>' +
        '<div class="score-pill" style="color:' + sl.color + '">&#x2B21; ' + sc + ' ' + sl.label + '</div>' +
        '</div>';
    }).join('');
    main.innerHTML =
      '<div class="page-header"><div class="page-title">' + (names[param]||param) + '</div><div class="page-sub">Sector deep-dive</div></div>' +
      '<div class="g3">' + cards + '</div>';
  }

  else if (page === 'watchlist') {
    var wCards = Object.keys(STOCKS).map(function(t) {
      var s = STOCKS[t]; var sc = calcScore(t); var sl = scoreLabel(sc,'quality');
      return '<div class="stock-card" onclick="openStock(\'' + t + '\')">' +
        '<div class="s-ticker">' + t + '</div>' +
        '<div class="s-name">' + s.name + '</div>' +
        '<div class="s-price lp" id="lp-' + t + '">$' + s.price.toFixed(2) + '</div>' +
        '<div class="s-chg ' + (s.change>=0?'pos':'neg') + '">' + (s.change>=0?'+':'') + s.change + '%</div>' +
        '<div class="score-pill" style="color:' + sl.color + '">&#x2B21; ' + sc + ' ' + sl.label + '</div>' +
        '</div>';
    }).join('');
    main.innerHTML =
      '<div class="page-header"><div class="page-title">Watchlist</div><div class="page-sub">All tracked stocks</div></div>' +
      '<div class="g3">' + wCards + '</div>';
  }

  else if (page === 'alerts') {
    var alerts = [
      {ticker:'NVDA',type:'Price Target',msg:'Approaching analyst consensus target of $1,050. Consider trimming position.',icon:'🎯',color:'#f0c040'},
      {ticker:'FCX',type:'Momentum',msg:'Strong copper demand signal. Breakout above $42 resistance confirmed.',icon:'📈',color:'#00e088'},
      {ticker:'PLTR',type:'Earnings',msg:'Q2 earnings in 3 weeks. AIP commercial growth is the key metric to watch.',icon:'📊',color:'#4f8fff'},
      {ticker:'AMD',type:'Catalyst',msg:'MI300X shipment data expected. Watch for NVDA market share commentary.',icon:'⚡',color:'#ffb020'},
      {ticker:'ABX',type:'Macro',msg:'Gold above $2,300. Barrick free cash flow inflection point reached.',icon:'🥇',color:'#c9a227'}
    ];
    var aHtml = alerts.map(function(a) {
      return '<div class="alert-row">' +
        '<div class="alert-icon" style="background:' + a.color + '20">' + a.icon + '</div>' +
        '<div style="flex:1">' +
        '<div style="display:flex;gap:8px;align-items:center;margin-bottom:5px">' +
        '<span style="color:#f0c040;font-weight:900">' + a.ticker + '</span>' +
        '<span class="tag">' + a.type + '</span>' +
        '</div>' +
        '<div style="font-size:13px;color:#6070a0">' + a.msg + '</div>' +
        '</div>' +
        '<button class="btn btn-sm" onclick="openStock(\'' + a.ticker + '\')">View</button>' +
        '</div>';
    }).join('');
    main.innerHTML =
      '<div class="page-header"><div class="page-title">Alerts</div><div class="page-sub">AI-generated signals</div></div>' +
      aHtml;
  }

  else if (page === 'news') {
    var news = [
      {tag:'AI',tagColor:'#4f8fff',title:'NVIDIA Blackwell GPU Demand Exceeds Supply Through Q3 2026',body:'Data center operators report 6-month lead times on H200 clusters. NVDA raises guidance citing unprecedented AI infrastructure buildout.',sentiment:'Bullish'},
      {tag:'Macro',tagColor:'#f0c040',title:'Fed Signals Two Rate Cuts in 2026 as Inflation Cools to 2.3%',body:'Core PCE hits Fed target for second consecutive month. Markets pricing 94% probability of June cut. Growth stocks rally on news.',sentiment:'Bullish'},
      {tag:'Mining',tagColor:'#c9a227',title:'Copper Deficit Widens as EV Demand Outpaces Mine Supply',body:'Goldman Sachs raises copper target to $12,000/ton. FCX and COPX ETF see record inflows. Grasberg expansion on track.',sentiment:'Bullish'},
      {tag:'Defense',tagColor:'#ff4d4d',title:'NATO Members Commit to 3% GDP Defense Spending by 2028',body:'LMT and RTX shares surge on expanded European orders. F-35 backlog grows to 800+ aircraft. Patriot missile demand at record highs.',sentiment:'Bullish'},
      {tag:'Tech',tagColor:'#00e088',title:'Microsoft Copilot Reaches 100M Daily Active Users',body:'Enterprise AI adoption accelerating faster than expected. Azure AI revenue up 180% YoY. MSFT raises FY2026 guidance.',sentiment:'Bullish'}
    ];
    var nHtml = news.map(function(n) {
      return '<div class="news-card">' +
        '<div class="news-tag" style="background:' + n.tagColor + '20;color:' + n.tagColor + '">' + n.tag + '</div>' +
        '<h3>' + n.title + '</h3>' +
        '<p>' + n.body + '</p>' +
        '<div style="margin-top:10px;font-size:11px;color:#00e088;font-weight:700">&#x25CF; ' + n.sentiment + '</div>' +
        '</div>';
    }).join('');
    main.innerHTML =
      '<div class="page-header"><div class="page-title">Market News</div><div class="page-sub">AI-curated intelligence</div></div>' +
      nHtml;
  }

  startLivePrices();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
// 1. Render dashboard immediately (no auth gate blocking render)
buildTicker();
showPage('dashboard');
startLivePrices();

// 2. Check auth asynchronously AFTER render — won't block anything
checkAuthAsync();
</script>
</body>
</html>
